<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>External UI Demo</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <link rel="stylesheet" href="./styles.scss" />
  </head>
  <body>
    <forge-scaffold>
      <forge-app-bar slot="header" theme-mode="scoped" title-text="External UI Demo">
        <forge-icon name="forge_logo" slot="logo"></forge-icon>
      </forge-app-bar>

      <forge-drawer slot="body-left" open>
        <forge-ai-chatbot id="chatbot"></forge-ai-chatbot>
      </forge-drawer>

      <main slot="body" id="content">
        <forge-card class="empty-state">
          <forge-page-state>
            <img src="https://cdn.forge.tylertech.com/v1/images/spot-hero/setup-2-empty-state-spot-hero.svg" alt="" slot="graphic" />
            <div slot="message">Ask the assistant to show you some data</div>
          </forge-page-state>
        </forge-card>
        <div id="table-container"></div>
      </main>
    </forge-scaffold>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
