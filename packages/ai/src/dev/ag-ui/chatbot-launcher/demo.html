<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Launcher Demo</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <link rel="stylesheet" href="./styles.scss" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <forge-scaffold>
      <forge-app-bar slot="header" theme-mode="scoped" title-text="Chatbot Launcher Demo">
        <forge-icon-button id="menuBtn" slot="start" aria-label="Toggle navigation">
          <forge-icon name="menu"></forge-icon>
        </forge-icon-button>
        <forge-icon name="forge_logo" slot="logo"></forge-icon>
      </forge-app-bar>

      <forge-drawer id="drawer" slot="body-left">
        <forge-scaffold>
          <forge-toolbar slot="header" no-divider>
            <h2 slot="start" class="forge-typography--heading5">Configuration</h2>
          </forge-toolbar>
          <div slot="body" class="drawer-content">
            <forge-text-field>
              <input type="text" id="baseUrl" value="http://localhost:3001/api/agents" />
              <label for="baseUrl">Base URL</label>
            </forge-text-field>
            <forge-text-field>
              <input type="text" id="agentId" value="agent-9b3ff935-f32d-477b-ac45-ce2a3570b90c" />
              <label for="agentId">Agent ID</label>
            </forge-text-field>
            <forge-button id="reconnectBtn" variant="raised" disabled>Reconnect</forge-button>
          </div>
        </forge-scaffold>
      </forge-drawer>

      <main slot="body">
        <forge-ai-chatbot-launcher
          id="launcher"
          title-text="AI Assistant"
          file-upload="on"
          enable-reactions
        ></forge-ai-chatbot-launcher>
      </main>
    </forge-scaffold>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
